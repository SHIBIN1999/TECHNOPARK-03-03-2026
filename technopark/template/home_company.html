{% extends 'base.html'%}
{% block content%}
<a href="{% url 'add_company'%}"class="btn btn-primary m-3">ADD</a>

<table class="table m-4">
  <thead>
    <tr>
      <th scope="col">NAME</th>
      <th scope="col">EMAIL</th>
      <th scope="col">LOCATION</th>
      <th scope="col">ACTION</th>

    </tr>
  </thead>
  {% for i in company %}
  <tbody>
    <tr>
      <th scope="row">{{i.name}}</th>
      <td>{{i.email}}</td>
      <td>{{i.location}}</td>
      <td><a href="{% url 'edit_company' i.id %}"class="btn btn-primary m-3">EDIT</a>
        <a href="{% url 'delete_company' i.id %}"class="btn btn-primary m-3">DELETE</a></td>
    </tr>
{% endfor%}
    
  </tbody>
</table>
{% endblock%}
